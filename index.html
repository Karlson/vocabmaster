const W=[0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,1.5330,0.1544,1.0047,1.9395,0.1100,0.2900,2.2700,0.8000,2.9898];
const DECAY=-0.5,FACTOR=Math.pow(0.9,1/DECAY)-1;

function initCard(){return{S:1,D:5,R:1,lapses:0,reps:0,due:Date.now(),interval:0};}

function fsrsGrade(card,g){
  if(card.reps===0){
    const iS=[W[0],W[1],W[2],W[3]][g];
    const iD=Math.max(1,Math.min(10,W[4]-W[5]*(g-2)));
    return{...card,S:iS,D:iD,reps:1,due:Date.now()+iS*86400000,interval:iS,R:Math.pow(1+FACTOR,DECAY)};
  }
  const{S,D,R}=card;
  const nD=Math.max(1,Math.min(10,D-W[6]*(g-2)));
  let nS;
  if(g===0){
    nS=Math.max(0.1,W[11]*Math.pow(nD,-W[12])*(Math.pow(S+1,W[13])-1)*Math.exp(W[14]*(1-R)));
  }else{
    nS=S*(Math.exp(W[8])*(11-nD)*Math.pow(S,-W[9])*(Math.exp(W[10]*(1-R))-1)+1);
    if(g===1)nS*=W[15];
    if(g===3)nS*=W[16];
    nS=Math.max(S*0.1,nS);
  }
  const ni=g===0?0.002:nS;
  return{...card,S:nS,D:nD,R:Math.pow(1+FACTOR*ni/nS,DECAY),reps:card.reps+1,lapses:g===0?card.lapses+1:card.lapses,due:Date.now()+ni*86400000,interval:ni};
}

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

const UNLOCK=0.7;
function isUnlocked(lv,progress){
  if(lv<=1)return true;
  const prev=LEVELS[String(lv-1)];
  if(!prev)return true;
  const seen=prev.filter(([],i)=>!!progress[cKey(lv-1,i)]).length;
  return seen/prev.length>=UNLOCK;
}

function getQueue(progress,settings,topic='all'){
  const now=Date.now();
  const sessionNew=settings.dailyNew>0?settings.dailyNew:(settings.sessionNew||20);
  const todayNew=settings.dailyNew>0?(loadL()[today()]?.new||0):0;
  const newLeft=Math.max(0,sessionNew-todayNew);
  const due=[],fresh=[];
  Object.entries(LEVELS).forEach(([lv,words])=>{
    if(!isUnlocked(+lv,progress))return;
    words.forEach(([word,tr,ex,hint],i)=>{
      if(topic!=='all'&&getWordTopic(word)!==topic)return;
      const card=progress[cKey(lv,i)];
      if(!card){if(fresh.length<newLeft)fresh.push({lv,i,word,tr,ex,hint,isNew:true});}
      else if(card.due<=now)due.push({lv,i,word,tr,ex,hint,card});
    });
  });
  loadC().forEach(([word,tr,ex,hint],i)=>{
    const k='custom_'+i,card=progress[k];
    if(!card){if(fresh.length<newLeft)fresh.push({lv:'custom',i,word,tr:tr||'',ex:ex||'',hint:hint||'',isNew:true,k});}
    else if(card.due<=now)due.push({lv:'custom',i,word,tr:tr||'',ex:ex||'',hint:hint||'',card,k});
  });
  return [...due,...shuffle(fresh)];
}

function getLevelStats(progress){
  const r={};
  Object.entries(LEVELS).forEach(([lv,words])=>{
    let mastered=0,learning=0,due=0;
    words.forEach(([],i)=>{
      const c=progress[cKey(lv,i)];
      if(!c)return;
      if(c.interval>21)mastered++;
      else if(c.reps>0)learning++;
      if(c.due<=Date.now())due++;
    });
    r[lv]={total:words.length,mastered,learning,due};
  });
  return r;
}

function getStreak(log){
  let s=0,d=new Date();
  if(!log[d.toISOString().slice(0,10)]?.reviews)d.setDate(d.getDate()-1);
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if(log[k]?.reviews>0){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}

  return html`<div style="position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0a0f1e;border-bottom:1px solid #1e293b;display:flex;justify-content:space-around;padding:4px 0;z-index:100">
    ${items.map(([s,ic,lb])=>html`<button key=${s} onClick=${s==='study'?onStudy:()=>goTo(s)}
      style="background:none;border:none;color:${screen===s?'#818cf8':'#475569'};display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 8px;font-size:10px;font-weight:700;min-width:48px">
      <span style="font-size:20px">${ic}</span>${lb}

  if(two)return html`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button onClick=${()=>onGrade(0)} style="padding:15px;border-radius:12px;border:none;background:#ef4444;color:#fff;font-weight:700;font-size:15px">✗ Не знал</button>
    <button onClick=${()=>onGrade(2)} style="padding:15px;border-radius:12px;border:none;background:#22c55e;color:#fff;font-weight:700;font-size:15px">✓ Знал</button>
  </div>`;
  return html`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
    ${[['Again','#ef4444',0],['Hard','#f97316',1],['Good','#22c55e',2],['Easy','#6366f1',3]].map(([l,c,g])=>html`
      <button key=${l} onClick=${()=>onGrade(g)} style="padding:13px 4px;border-radius:12px;border:none;background:${c};color:#fff;font-weight:700;font-size:12px">${l}</button>
    `)}
  </div>`;
}

// ── MNEMONIC HINT ─────────────────────────────────────────────────
const MNEMONICS={
  'ephemeral':'греч. epi+hemera (день) — живёт один день',
  'serendipity':'от сказки о принцах из Serendip (Шри-Ланка)',
  'narcissism':'греч. миф: Нарцисс влюбился в своё отражение',
  'hubris':'греч. hybris — дерзость, наказуемая богами',
  'catalyst':'греч. katalysis — снятие препятствия для реакции',
  'entropy':'греч. en+tropē — внутреннее преобразование',
  'placebo':'лат. "я понравлюсь" — безвредная пустышка',
  'paradigm':'греч. paradeigma — образец, пример',
  'zeitgeist':'нем. Zeit (время) + Geist (дух)',
  'hegemony':'греч. hēgemonia — лидерство, руководство',
  'diaspora':'греч. diaspeirō — рассеивать, рассыпать',
  'empathy':'греч. em+pathos — чувствовать внутри',
  'cognitive':'лат. cognoscere — познавать, узнавать',
  'resilient':'лат. resilire — отпрыгивать назад',
  'volatile':'лат. volare — летать (о летучих жидкостях)',
  'rhetoric':'греч. rhētorikē — искусство оратора',
  'laconic':'спартанцы из Laconia были известны краткостью речи',
  'algorithm':'от имени математика аль-Хорезми',
  'ambiguous':'лат. ambi (оба) + agere — тянуть в двух направлениях',
  'sycophant':'греч. sykon (инжир) + phainein — доносчик в судах',
  'ubiquitous':'лат. ubique — везде, повсюду',
  'gregarious':'лат. grex — стадо, любит быть в группе',
  'laconic':'спартанцы из Laconii были известны краткостью речи',
  'tenacious':'лат. tenax — держащийся крепко',
};

function MnemonicHint({item}){
  const tip=MNEMONICS[item.word.toLowerCase()];
  return html`<div style="background:#1e2942;border-radius:14px;padding:12px 14px;border-left:3px solid #6366f1">
    <div style="font-size:11px;color:#6366f1;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">💡 Подсказка</div>
    ${tip
      ?html`<div style="color:#c7d2fe;font-size:13px">${tip}</div>`
      :html`<div style="color:#94a3b8;font-size:13px">Тема: <strong style="color:#818cf8">${TOPICS[getWordTopic(item.word)]||'Общие'}</strong> · L${item.lv}</div>`}
  </div>`;
}

// ── CARD MODES ────────────────────────────────────────────────────
function CardMode({item,onGrade,two}){
  const [flipped,setFlipped]=useState(false);
  const [wrong,setWrong]=useState(false);
  useEffect(()=>{setFlipped(false);setWrong(false);},[item.word]);
  function grade(g){setWrong(g<2);onGrade(g);}
  return html`<div style="flex:1;display:flex;flex-direction:column;gap:12px">
    <div onClick=${!flipped?()=>setFlipped(true):null}
      style="background:#1e293b;border-radius:22px;padding:36px 24px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;min-height:220px;cursor:${flipped?'default':'pointer'}">
      ${flipped?html`
        <div style="font-size:34px;font-weight:800;color:#818cf8;margin-bottom:10px">${item.tr}</div>
        <div style="color:#64748b;font-size:13px">${item.hint}</div>
        <div style="color:#94a3b8;font-size:14px;margin-top:10px;font-style:italic">${item.ex}</div>
      `:html`
        <div style="font-size:40px;font-weight:800;margin-bottom:10px">${item.word}</div>
        <div style="color:#64748b;font-size:15px;font-style:italic">${item.ex}</div>
        <div style="color:#334155;font-size:13px;margin-top:20px">нажми для перевода</div>
      `}
    </div>
    ${wrong&&html`<${MnemonicHint} item=${item}/>`}
    ${flipped?html`<${GradeButtons} onGrade=${grade} two=${two}/>`:html`<${Btn} onClick=${()=>setFlipped(true)}>Показать перевод</${Btn}>`}
  </div>`;
}

function ChoiceMode({item,onGrade}){
  const [choices]=useState(()=>{
    const all=Object.values(LEVELS).flat();
    const wrong=shuffle(all.filter(w=>w[1]!==item.tr)).slice(0,3).map(w=>w[1]);
    return shuffle([item.tr,...wrong]);
  });
  const [picked,setPicked]=useState(null);
  const timerRef=useRef(null);
  useEffect(()=>{setPicked(null);return()=>clearTimeout(timerRef.current);},[item.word]);
  function pick(c){
    if(picked)return;
    setPicked(c);
    timerRef.current=setTimeout(()=>onGrade(c===item.tr?2:0),700);
  }
  return html`<div style="flex:1;display:flex;flex-direction:column;gap:14px">
    <div style="background:#1e293b;border-radius:22px;padding:32px 24px;text-align:center">
      <div style="font-size:38px;font-weight:800;margin-bottom:8px">${item.word}</div>
      <div style="color:#64748b;font-size:14px;font-style:italic">${item.ex}</div>
    </div>
    ${choices.map(c=>{
      let bg='#1e293b',bd='#334155',cl='#e2e8f0';
      if(picked){if(c===item.tr){bg='rgba(34,197,94,.2)';bd='#22c55e';cl='#4ade80';}
      else if(c===picked){bg='rgba(239,68,68,.1)';bd='#ef4444';cl='#f87171';}}
      return html`<button key=${c} onClick=${()=>pick(c)}
        style="padding:16px;border-radius:14px;border:2px solid ${bd};background:${bg};color:${cl};font-size:15px;font-weight:600;text-align:left;transition:all .2s">${c}</button>`;
    })}
  </div>`;
}

function TypeMode({item,onGrade}){
  const [typed,setTyped]=useState('');
  const [result,setResult]=useState(null);
  const [listening,setListening]=useState(false);
  const ref=useRef();
  const recRef=useRef(null);

  useEffect(()=>{
    setTyped('');setResult(null);setListening(false);
    setTimeout(()=>ref.current?.focus(),120);
    return()=>{recRef.current?.abort();};
  },[item.word]);

  function check(val){
    const v=(val||typed).trim().toLowerCase();
    if(!v||result)return;
    const correct=item.tr.toLowerCase();
    const ok=v===correct||(correct.includes(v)&&v.length>3);
    setResult(ok?'ok':'err');
    if(ok)setTimeout(()=>onGrade(2),700);
  }

  function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Голосовой ввод не поддерживается в этом браузере');return;}
    const rec=new SR();
    rec.lang='ru-RU';
    rec.interimResults=false;
    rec.maxAlternatives=3;
    recRef.current=rec;
    setListening(true);
    rec.onresult=e=>{
      const best=Array.from(e.results[0])
        .map(r=>r.transcript.trim().toLowerCase())
        .find(t=>t===item.tr.toLowerCase())||e.results[0][0].transcript.trim().toLowerCase();
      setTyped(best);
      setListening(false);
      check(best);
    };
    rec.onerror=()=>setListening(false);
    rec.onend=()=>setListening(false);
    rec.start();
  }

  function stopVoice(){recRef.current?.stop();setListening(false);}

  return html`<div style="flex:1;display:flex;flex-direction:column;gap:14px">
    <div style="background:#1e293b;border-radius:22px;padding:32px 24px;text-align:center">
      <div style="color:#64748b;font-size:13px;margin-bottom:8px">переведи на русский:</div>
      <div style="font-size:38px;font-weight:800;margin-bottom:8px">${item.word}</div>
      <div style="color:#64748b;font-size:14px;font-style:italic">${item.ex}</div>
    </div>

    <div style="position:relative">
      <input ref=${ref} value=${typed} onInput=${e=>setTyped(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&check()}
        disabled=${!!result||listening} placeholder=${listening?'🎤 Говори...':'введи или скажи перевод...'}
        style="padding:16px 50px 16px 16px;font-size:17px;border-radius:14px;border:2px solid ${listening?'#8b5cf6':result==='ok'?'#22c55e':result==='err'?'#ef4444':'#334155'};text-align:center;background:${listening?'#1e1040':'#1e293b'};transition:all .2s"/>
      ${!result&&html`<button onClick=${listening?stopVoice:startVoice}
        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:${listening?'#8b5cf6':'#334155'};border:none;border-radius:8px;padding:6px 10px;font-size:18px;color:#fff;transition:all .2s">
        ${listening?'⏹':'🎤'}
      </button>`}
    </div>

    ${listening&&html`<div style="text-align:center;color:#a78bfa;font-size:13px;animation:su .3s ease">
      🎤 Слушаю... (скажи перевод по-русски)
    </div>`}

    ${result==='err'&&html`<${MnemonicHint} item=${item}/>`}
    ${result==='err'&&html`<div style="text-align:center;color:#94a3b8">Правильно: <strong style="color:#4ade80">${item.tr}</strong></div>`}
    ${!result&&html`<${Btn} onClick=${()=>check()}>Проверить →</${Btn}>`}
    ${result==='err'&&html`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button onClick=${()=>onGrade(0)} style="padding:14px;border-radius:12px;border:none;background:#ef4444;color:#fff;font-weight:700">Again</button>
      <button onClick=${()=>onGrade(2)} style="padding:14px;border-radius:12px;border:none;background:#22c55e;color:#fff;font-weight:700">✓ Знал</button>
    </div>`}
  </div>`;
}

// ── SPRINT ────────────────────────────────────────────────────────
function SprintScreen({progress,onDone}){
  const TOTAL=10,TIME=5;
  function buildPool(){
    const all=[];
    Object.entries(LEVELS).forEach(([lv,words])=>{
      if(!isUnlocked(+lv,progress))return;
      words.forEach(([word,tr,ex,hint],i)=>all.push({lv,i,word,tr,ex,hint}));
    });
    return shuffle(all).slice(0,TOTAL);
  }
  const [pool,setPool]=useState(buildPool);
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [score,setScore]=useState(0);
  const [timeLeft,setTimeLeft]=useState(TIME);
  const [done,setDone]=useState(false);
  const timerRef=useRef(null);
  const item=pool[idx];

  useEffect(()=>{
    if(done||flipped)return;
    const id=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){clearInterval(id);setFlipped(true);return 0;}
        return t-1;
      });
    },1000);
    timerRef.current=id;
    return()=>clearInterval(id);
  },[idx,flipped,done]);

  function next(ok){
    clearInterval(timerRef.current);
    if(ok)setScore(s=>s+1);
    const p=loadP();
    const k=cKey(item.lv,item.i);
    p[k]=fsrsGrade(p[k]||initCard(),ok?2:0);
    saveP(p);
    if(idx+1>=TOTAL)setDone(true);
    else{setIdx(i=>i+1);setFlipped(false);setTimeLeft(TIME);}
  }

  function restart(){setPool(buildPool());setIdx(0);setScore(0);setFlipped(false);setTimeLeft(TIME);setDone(false);}

  if(done)return html`<div style="min-height:100vh;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;max-width:420px;margin:0 auto" class="su">
    <div style="font-size:64px;margin-bottom:16px">${score>=8?'🏆':score>=5?'⚡':'💪'}</div>
    <h2 style="font-size:28px;font-weight:800;margin:0 0 8px">Спринт завершён!</h2>
    <p style="color:#64748b;margin-bottom:6px">${score} из ${TOTAL} верно</p>
    <div style="font-size:36px;font-weight:800;color:${score>=8?'#22c55e':score>=5?'#f59e0b':'#ef4444'};margin-bottom:28px">${Math.round(score/TOTAL*100)}%</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%">
      <button onClick=${restart} style="padding:14px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-weight:700">⚡ Ещё раз</button>
      <button onClick=${onDone} style="padding:14px;border-radius:12px;border:none;background:#1e293b;color:#e2e8f0;font-weight:700">← Главная</button>
    </div>
  </div>`;

  const pct=(timeLeft/TIME)*100;
  const tc=timeLeft>3?'#22c55e':timeLeft>1?'#f59e0b':'#ef4444';
  return html`<div style="min-height:100vh;background:#0f172a;display:flex;flex-direction:column;max-width:420px;margin:0 auto;padding:72px 16px 16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button onClick=${onDone} style="background:none;border:none;color:#64748b;font-size:20px">✕</button>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:#64748b;font-size:13px">${idx+1}/${TOTAL}</span>
        <div style="background:#1e293b;border-radius:20px;padding:4px 12px;font-weight:800;color:${tc};font-size:16px;min-width:36px;text-align:center">${timeLeft}</div>
      </div>
      <span style="color:#f59e0b;font-weight:700">⚡ ${score}</span>
    </div>
    <div style="background:#1e293b;border-radius:999px;height:4px;margin-bottom:14px">
      <div style="width:${pct}%;height:100%;background:${tc};border-radius:999px;transition:width 1s linear"></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:12px">
      <div onClick=${!flipped?()=>{clearInterval(timerRef.current);setFlipped(true);}:null}
        style="background:#1e293b;border-radius:22px;padding:36px 24px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;cursor:${flipped?'default':'pointer'}">
        ${flipped?html`
          <div style="font-size:32px;font-weight:800;color:#818cf8;margin-bottom:10px">${item.tr}</div>
          <div style="color:#64748b;font-size:13px">${item.hint}</div>
          <div style="color:#94a3b8;font-size:13px;font-style:italic;margin-top:8px">${item.ex}</div>
        `:html`
          <div style="color:#64748b;font-size:13px;margin-bottom:8px">⚡ СПРИНТ</div>
          <div style="font-size:42px;font-weight:800;margin-bottom:10px">${item.word}</div>
          <div style="color:#64748b;font-size:14px;font-style:italic">${item.ex}</div>
          <div style="color:#334155;font-size:12px;margin-top:16px">нажми или жди таймер</div>
        `}
      </div>
      ${flipped&&html`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button onClick=${()=>next(false)} style="padding:15px;border-radius:12px;border:none;background:#ef4444;color:#fff;font-weight:700">✗ Не знал</button>
        <button onClick=${()=>next(true)} style="padding:15px;border-radius:12px;border:none;background:#22c55e;color:#fff;font-weight:700">✓ Знал</button>
      </div>`}
    </div>
  </div>`;
}

  const stats=useMemo(()=>getLevelStats(progress),[progress]);

  const totalW=useMemo(()=>Object.values(LEVELS).reduce((s,a)=>s+a.length,0),[]);
  const streak=useMemo(()=>getStreak(log),[log]);
  const n=queue.length;

        <button key=${k} onClick=${()=>setTopic(k)}

function StudyScreen({progress,settings,topic,onDone}){
  const [queue]=useState(()=>getQueue(progress,settings,topic));
  const [idx,setIdx]=useState(0);
  const [correct,setCorrect]=useState(0);
  const item=queue[idx];

  useEffect(()=>{
    if(idx<queue.length)return;
    const td=today();
    const log=loadL();
    if(!log[td])log[td]={reviews:0,correct:0,new:0};
    log[td].reviews+=idx;log[td].correct+=correct;
    saveL(log);
  },[idx]);

  if(!item||idx>=queue.length)return html`<${ResultsScreen} total=${queue.length} correct=${correct} onDone=${onDone}/>`;

  const MODES=['card','choice','type','card'];
  const mode=MODES[(item.i+(item.lv==='custom'?0:+item.lv||0))%MODES.length];

  function grade(g){

    <input placeholder="🔍 Поиск..." value=${search} onInput=${e=>setSearch(e.target.value)} style="margin-bottom:10px"/>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px">

function StoryScreen({progress,settings,showToast,onBack}){
  const [story,setStory]=useState('');
  const [words,setWords]=useState([]);
  const [loading,setLoading]=useState(false);
  const learning=useMemo(()=>{
    const ws=[];
    Object.entries(LEVELS).forEach(([lv,wds])=>wds.forEach(([word],i)=>{
      const c=progress[cKey(lv,i)];if(c&&c.interval<21&&c.reps>0)ws.push(word);
    }));
    return ws;
  },[progress]);
  async function gen(){
    if(!settings.proxyUrl){showToast('Настрой Proxy URL в ⚙️','#f97316');return;}
    const picked=shuffle(learning).slice(0,7);
    if(!picked.length){showToast('Сначала начни учить слова!','#f97316');return;}
    setWords(picked);setLoading(true);setStory('');
    try{
      const res=await fetch(settings.proxyUrl,{method:'POST',headers:{'Content-Type':'application/json',...(settings.authToken?{'X-Auth-Token':settings.authToken}:{})},
        body:JSON.stringify({model:'claude-3-haiku-20240307',max_tokens:450,messages:[{role:'user',content:`Write a short story (7-9 sentences) using all these words: ${picked.join(', ')}. Bold each target word **word**. B1 level, no preamble.`}]})});
      const d=await res.json();setStory(d.content?.[0]?.text||'Ошибка');
    }catch(e){showToast('Ошибка: '+e.message,'#ef4444');}
    finally{setLoading(false);}
  }
  onboard.done=true;onboard.suggestedLevel=suggestedLevel;
  onboard.byLv=byLv;
  save('vm2_onboarded',true);
  save('vm2_onboard_level',suggestedLevel);
  render();
}

      <div style="font-size:48px;margin-bottom:16px">⚠️</div>
      <h2 style="color:#fff;margin:0 0 8px">Ошибка</h2>
      <p style="color:#ef4444;font-size:12px;font-family:monospace;margin-bottom:20px;word-break:break-all">${this.state.err.message}</p>
      <button onClick=${()=>this.setState({err:null})} style="padding:12px 24px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-weight:700">Попробовать снова</button>
    </div>`;
    return this.props.children;
  }
}

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('home');
  const [progress,setProgress]=useState(loadP);
  const [settings,setSettings]=useState(loadS);
  const [toast,setToast]=useState(null);
  const [studyTopic,setStudyTopic]=useState('all');

  function showToast(msg,color='#6366f1'){setToast({msg,color,id:Date.now()});setTimeout(()=>setToast(null),2500);}
  function goTo(s){setScreen(s);}
  function goHome(){setProgress(loadP());setScreen('home');}
  function onStudy(topic='all'){setStudyTopic(topic);setScreen('study');}
  function onSprint(){setScreen('sprint');}
  function saveSettings(s){save(LS.s,s);setSettings(s);}

  const props={progress,settings,showToast,onBack:goHome};
  return html`<div>
    ${screen==='home'    &&html`<${HomeScreen}      ...${props} onStudy=${onStudy} onSprint=${onSprint} goTo=${goTo}/>`}
    ${screen==='study'   &&html`<${StudyScreen}     ...${props} topic=${studyTopic} onDone=${goHome}/>`}
    ${screen==='sprint'  &&html`<${SprintScreen}    ...${props} onDone=${goHome}/>`}
    ${screen==='analytics'&&html`<${AnalyticsScreen} ...${props}/>`}
    ${screen==='words'   &&html`<${WordsScreen}     ...${props}/>`}
    ${screen==='idioms'  &&html`<${IdiomsScreen}    ...${props}/>`}
    ${screen==='story'   &&html`<${StoryScreen}     ...${props}/>`}
    ${screen==='settings'&&html`<${SettingsScreen}  ...${props} onSave=${saveSettings}/>`}
    <${TopNav} screen=${screen} goTo=${goTo} onStudy=${()=>onStudy('all')}/>
    ${toast&&html`<${Toast} msg=${toast.msg} color=${toast.color}/>`}
  </div>`;
}

prender(html`<${ErrBound}><${App}/></${ErrBound}>`,document.getElementById('root'));
</script>
</body>
</html>
